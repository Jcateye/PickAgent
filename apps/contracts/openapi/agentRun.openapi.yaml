openapi: 3.0.3
info:
  title: "Agent Run API"
  version: "1.0.0"
  description: "Agent Run 表，保存 Pi 单次运行、模型信息、状态和 WorkflowRun 关联"
tags:
  - name: "Agent Run"
    description: "Agent Run 表，保存 Pi 单次运行、模型信息、状态和 WorkflowRun 关联"
paths:
  /api/v1/agent-runs:
    get:
      tags: ["Agent Run"]
      summary: "查询Agent Run列表"
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: "页码"
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
          description: "每页数量"
        - in: query
          name: id
          schema:
            type: string
          description: "主键"
        - in: query
          name: missionId
          schema:
            type: string
          description: "Agent Mission ID"
        - in: query
          name: sessionId
          schema:
            type: string
          description: "Agent 会话 ID"
        - in: query
          name: piRunId
          schema:
            type: string
          description: "Pi 运行 ID"
        - in: query
          name: workflowRunId
          schema:
            type: string
          description: "关联 WorkflowRun ID"
        - in: query
          name: status
          schema:
            type: string
          description: "Agent Run 状态"
        - in: query
          name: modelProvider
          schema:
            type: string
          description: "模型提供方"
        - in: query
          name: modelName
          schema:
            type: string
          description: "模型名称"
        - in: query
          name: timeoutMs
          schema:
            type: integer
            format: int32
          description: "超时时间毫秒"
        - in: query
          name: cancelRequested
          schema:
            type: boolean
          description: "取消请求标记"
        - in: query
          name: startedAt
          schema:
            type: string
            format: date-time
          description: "开始时间"
        - in: query
          name: completedAt
          schema:
            type: string
            format: date-time
          description: "完成时间"
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - id
              - missionId
              - sessionId
              - piRunId
              - workflowRunId
              - status
              - modelProvider
              - modelName
              - timeoutMs
              - cancelRequested
              - startedAt
              - completedAt
              - createdAt
              - updatedAt
          description: "排序字段"
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
          description: "排序方向"
      responses:
        '200':
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: ["Agent Run"]
      summary: "创建Agent Run"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRunRequest'
      responses:
        '200':
          description: "创建成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
  /api/v1/agent-runs/{id}:
    get:
      tags: ["Agent Run"]
      summary: "查询Agent Run详情"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      responses:
        '200':
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
    patch:
      tags: ["Agent Run"]
      summary: "更新Agent Run"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRunRequest'
      responses:
        '200':
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
    delete:
      tags: ["Agent Run"]
      summary: "删除Agent Run"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      responses:
        '200':
          description: "删除成功"
components:
  schemas:
    CreateAgentRunRequest:
      type: object
      properties:
        missionId:
          type: string
          description: "Agent Mission ID"
          example: "sample_mission_id"
        sessionId:
          type: string
          description: "Agent 会话 ID"
          example: "sample_session_id"
        piRunId:
          type: string
          description: "Pi 运行 ID"
          nullable: true
          example: "sample_pi_run_id"
        workflowRunId:
          type: string
          description: "关联 WorkflowRun ID"
          nullable: true
          example: "sample_workflow_run_id"
        status:
          type: string
          description: "Agent Run 状态"
          example: "QUEUED"
        modelProvider:
          type: string
          description: "模型提供方"
          nullable: true
          example: "sample_model_provider"
        modelName:
          type: string
          description: "模型名称"
          nullable: true
          example: "demo"
        inputJson:
          type: object
          description: "输入摘要 JSON"
          example: "{'key': 'value'}"
        outputJson:
          type: object
          description: "输出摘要 JSON"
          example: "{'key': 'value'}"
        errorMessage:
          type: string
          description: "错误信息"
          nullable: true
          example: "sample_error_message"
        timeoutMs:
          type: integer
          format: int32
          description: "超时时间毫秒"
          nullable: true
          example: 1
        cancelRequested:
          type: boolean
          description: "取消请求标记"
          example: true
        usageJson:
          type: object
          description: "模型用量 JSON"
          example: "{'key': 'value'}"
        metadataJson:
          type: object
          description: "运行元数据 JSON"
          example: "{'key': 'value'}"
        startedAt:
          type: string
          format: date-time
          description: "开始时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
        completedAt:
          type: string
          format: date-time
          description: "完成时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
      required:
        - missionId
        - sessionId
    UpdateAgentRunRequest:
      type: object
      properties:
        missionId:
          type: string
          description: "Agent Mission ID"
          example: "sample_mission_id"
        sessionId:
          type: string
          description: "Agent 会话 ID"
          example: "sample_session_id"
        piRunId:
          type: string
          description: "Pi 运行 ID"
          nullable: true
          example: "sample_pi_run_id"
        workflowRunId:
          type: string
          description: "关联 WorkflowRun ID"
          nullable: true
          example: "sample_workflow_run_id"
        status:
          type: string
          description: "Agent Run 状态"
          example: "QUEUED"
        modelProvider:
          type: string
          description: "模型提供方"
          nullable: true
          example: "sample_model_provider"
        modelName:
          type: string
          description: "模型名称"
          nullable: true
          example: "demo"
        inputJson:
          type: object
          description: "输入摘要 JSON"
          example: "{'key': 'value'}"
        outputJson:
          type: object
          description: "输出摘要 JSON"
          example: "{'key': 'value'}"
        errorMessage:
          type: string
          description: "错误信息"
          nullable: true
          example: "sample_error_message"
        timeoutMs:
          type: integer
          format: int32
          description: "超时时间毫秒"
          nullable: true
          example: 1
        cancelRequested:
          type: boolean
          description: "取消请求标记"
          example: true
        usageJson:
          type: object
          description: "模型用量 JSON"
          example: "{'key': 'value'}"
        metadataJson:
          type: object
          description: "运行元数据 JSON"
          example: "{'key': 'value'}"
        startedAt:
          type: string
          format: date-time
          description: "开始时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
        completedAt:
          type: string
          format: date-time
          description: "完成时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
    AgentRunResponse:
      type: object
      properties:
        id:
          type: string
          description: "主键"
          example: "sample_id"
        missionId:
          type: string
          description: "Agent Mission ID"
          example: "sample_mission_id"
        sessionId:
          type: string
          description: "Agent 会话 ID"
          example: "sample_session_id"
        piRunId:
          type: string
          description: "Pi 运行 ID"
          nullable: true
          example: "sample_pi_run_id"
        workflowRunId:
          type: string
          description: "关联 WorkflowRun ID"
          nullable: true
          example: "sample_workflow_run_id"
        status:
          type: string
          description: "Agent Run 状态"
          example: "QUEUED"
        modelProvider:
          type: string
          description: "模型提供方"
          nullable: true
          example: "sample_model_provider"
        modelName:
          type: string
          description: "模型名称"
          nullable: true
          example: "demo"
        inputJson:
          type: object
          description: "输入摘要 JSON"
          example: "{'key': 'value'}"
        outputJson:
          type: object
          description: "输出摘要 JSON"
          example: "{'key': 'value'}"
        errorMessage:
          type: string
          description: "错误信息"
          nullable: true
          example: "sample_error_message"
        timeoutMs:
          type: integer
          format: int32
          description: "超时时间毫秒"
          nullable: true
          example: 1
        cancelRequested:
          type: boolean
          description: "取消请求标记"
          example: true
        usageJson:
          type: object
          description: "模型用量 JSON"
          example: "{'key': 'value'}"
        metadataJson:
          type: object
          description: "运行元数据 JSON"
          example: "{'key': 'value'}"
        startedAt:
          type: string
          format: date-time
          description: "开始时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
        completedAt:
          type: string
          format: date-time
          description: "完成时间"
          nullable: true
          example: "2026-03-16T10:00:00Z"
        createdAt:
          type: string
          format: date-time
          description: "创建时间"
          example: "2026-03-16T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: "更新时间"
          example: "2026-03-16T10:00:00Z"
      required:
        - cancelRequested
        - createdAt
        - id
        - inputJson
        - metadataJson
        - missionId
        - outputJson
        - sessionId
        - status
        - updatedAt
        - usageJson
    ListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentRunResponse'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - pageSize
        - total
