openapi: 3.0.3
info:
  title: "Connector API"
  version: "1.0.0"
  description: "数据连接器表，记录插件、平台 API、报表导入等采集来源"
tags:
  - name: "Connector"
    description: "数据连接器表，记录插件、平台 API、报表导入等采集来源"
paths:
  /api/v1/connectors:
    get:
      tags: ["Connector"]
      summary: "查询Connector列表"
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: "页码"
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
          description: "每页数量"
        - in: query
          name: id
          schema:
            type: string
          description: "主键"
        - in: query
          name: code
          schema:
            type: string
          description: "连接器编码"
        - in: query
          name: name
          schema:
            type: string
          description: "连接器名称"
        - in: query
          name: kind
          schema:
            type: string
          description: "连接器类型"
        - in: query
          name: platform
          schema:
            type: string
          description: "电商平台标识"
        - in: query
          name: status
          schema:
            type: string
          description: "连接器状态"
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - id
              - code
              - name
              - kind
              - platform
              - status
              - createdAt
              - updatedAt
          description: "排序字段"
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
          description: "排序方向"
      responses:
        '200':
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: ["Connector"]
      summary: "创建Connector"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorRequest'
      responses:
        '200':
          description: "创建成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorResponse'
  /api/v1/connectors/{id}:
    get:
      tags: ["Connector"]
      summary: "查询Connector详情"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      responses:
        '200':
          description: "查询成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorResponse'
    patch:
      tags: ["Connector"]
      summary: "更新Connector"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectorRequest'
      responses:
        '200':
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorResponse'
    delete:
      tags: ["Connector"]
      summary: "删除Connector"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "主键"
      responses:
        '200':
          description: "删除成功"
components:
  schemas:
    CreateConnectorRequest:
      type: object
      properties:
        code:
          type: string
          description: "连接器编码"
          example: "sample_code"
        name:
          type: string
          description: "连接器名称"
          example: "demo"
        kind:
          type: string
          description: "连接器类型"
          example: "sample_kind"
        platform:
          type: string
          description: "电商平台标识"
          nullable: true
          example: "sample_platform"
        configJson:
          type: object
          description: "连接器配置 JSON"
          example: "{'key': 'value'}"
        status:
          type: string
          description: "连接器状态"
          example: "active"
      required:
        - code
        - kind
        - name
    UpdateConnectorRequest:
      type: object
      properties:
        code:
          type: string
          description: "连接器编码"
          example: "sample_code"
        name:
          type: string
          description: "连接器名称"
          example: "demo"
        kind:
          type: string
          description: "连接器类型"
          example: "sample_kind"
        platform:
          type: string
          description: "电商平台标识"
          nullable: true
          example: "sample_platform"
        configJson:
          type: object
          description: "连接器配置 JSON"
          example: "{'key': 'value'}"
        status:
          type: string
          description: "连接器状态"
          example: "active"
    ConnectorResponse:
      type: object
      properties:
        id:
          type: string
          description: "主键"
          example: "sample_id"
        code:
          type: string
          description: "连接器编码"
          example: "sample_code"
        name:
          type: string
          description: "连接器名称"
          example: "demo"
        kind:
          type: string
          description: "连接器类型"
          example: "sample_kind"
        platform:
          type: string
          description: "电商平台标识"
          nullable: true
          example: "sample_platform"
        configJson:
          type: object
          description: "连接器配置 JSON"
          example: "{'key': 'value'}"
        status:
          type: string
          description: "连接器状态"
          example: "active"
        createdAt:
          type: string
          format: date-time
          description: "创建时间"
          example: "2026-03-16T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: "更新时间"
          example: "2026-03-16T10:00:00Z"
      required:
        - code
        - configJson
        - createdAt
        - id
        - kind
        - name
        - status
        - updatedAt
    ListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConnectorResponse'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - pageSize
        - total
